name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # Release notes are generated from the commits since the previous tag.
          changelog: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ftpsync
          target: ${{ matrix.target }}
          # Produces ftpsync-<target>.tar.gz (.zip on Windows) plus a .sha256.
          archive: ftpsync-$target
          checksum: sha256
          # cross is installed automatically for the musl / aarch64 targets.
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: [create-release, upload-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read # gh release download (built-in GITHUB_TOKEN)
      id-token: write # npm Trusted Publishing (OIDC) + provenance — no secret needed
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - name: Assemble and publish npm packages
        # No NODE_AUTH_TOKEN: npm authenticates via the OIDC id-token. Each
        # package must have a Trusted Publisher configured on npmjs.com
        # (repo OzzyCzech/ftpsync, workflow release.yml).
        run: node npm/build.mjs "${{ github.ref_name }}"
        env:
          # Built-in, auto-provided token — only used by `gh release download`
          # to fetch the binaries attached by the upload-assets job.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
